version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: hackcanada-postgres
    environment:
      POSTGRES_USER: hackcanada
      POSTGRES_PASSWORD: hackcanada
      POSTGRES_DB: hackcanada_db
    ports:
      - "5433:5432"
    volumes:
      - hackcanada_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackcanada -d hackcanada_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: hackcanada-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PYTHONPATH: /backend
    volumes:
      - ./app:/backend/app
      - ./migrations:/backend/migrations
      - ./tests:/backend/tests
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  hackcanada_postgres_data:
