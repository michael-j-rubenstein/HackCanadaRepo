version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: hackcanada-postgres
    environment:
      POSTGRES_USER: hackcanada
      POSTGRES_PASSWORD: hackcanada
      POSTGRES_DB: hackcanada_db
    ports:
      - "5432:5432"
    volumes:
      - hackcanada_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackcanada -d hackcanada_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: hackcanada-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://hackcanada:hackcanada@postgres:5432/hackcanada_db
      API_V1_STR: /api/v1
      PROJECT_NAME: HackCanadaRepo
      PYTHONPATH: /backend
    volumes:
      - ./app:/backend/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  hackcanada_postgres_data:
